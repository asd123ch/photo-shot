# Rate-limit key = the real client IP. Behind the Cloudflare tunnel every
# request reaches nginx from the cloudflared container, so peer IP is useless;
# use Cloudflare's CF-Connecting-IP, falling back to the peer for LAN/Traefik.
map $http_cf_connecting_ip $rl_key {
    ""      $remote_addr;
    default $http_cf_connecting_ip;
}
# Brute-force throttle for the unlock check (applied to /api/auth only).
limit_req_zone $rl_key zone=authlimit:10m rate=10r/m;
limit_req_status 429;

# API proxy auth map (the unlock-password check). Generated at container start
# by docker/render-config.sh. Wildcard include is a no-op if the file is absent.
include /etc/nginx/api/http-*.conf;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Base64-encoded image uploads flow through the API proxy.
    client_max_body_size 30m;

    # Server-side API proxy: forwards /api/<provider>/ to each provider with the
    # real key injected, gated by the unlock password. Generated at start.
    include /etc/nginx/api/server-*.conf;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Fingerprinted build assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # App icons — fixed names, cache for a week.
    location /icons/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Web app manifest — correct content type, no long caching.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-store";
    }

    # Runtime config advertises which providers are configured (booleans, never
    # the keys) and is regenerated per deploy — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # Service worker bits — never cache so updates roll out immediately.
    location = /sw.js {
        add_header Cache-Control "no-store";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store";
    }

    # SPA: serve index.html for any unmatched route, and don't cache the shell.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
